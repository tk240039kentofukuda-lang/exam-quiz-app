<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末試験対策クイズ | 知的財産法</title>
    <meta name="description" content="著作権法・特許法・実用新案権・意匠権・商標法・不正競争防止法の期末試験対策4択クイズアプリ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- ===== START SCREEN ===== -->
    <div class="screen active" id="startScreen">
        <div class="start-container">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="8" y="8" width="48" height="48" rx="12" stroke="url(#logoGrad)" stroke-width="3"/>
                        <path d="M22 32L28 38L42 24" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="8" y1="8" x2="56" y2="56">
                                <stop stop-color="#818cf8"/>
                                <stop offset="1" stop-color="#c084fc"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-title">期末試験対策クイズ</h1>
                <p class="app-subtitle">知的財産法 — 4択問題で実力チェック</p>
            </div>

            <div class="category-grid">
                <button class="category-card" data-category="copyright" id="btnCopyright">
                    <div class="card-icon">📜</div>
                    <div class="card-info">
                        <h3>著作権法</h3>
                        <span class="card-meta">Day6 ・ 10問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>

                <button class="category-card" data-category="patent" id="btnPatent">
                    <div class="card-icon">⚙️</div>
                    <div class="card-info">
                        <h3>特許法</h3>
                        <span class="card-meta">Day8 ・ 10問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>

                <button class="category-card" data-category="design" id="btnDesign">
                    <div class="card-icon">🎨</div>
                    <div class="card-info">
                        <h3>実用新案権・意匠権</h3>
                        <span class="card-meta">Day10 ・ 10問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>

                <button class="category-card" data-category="trademark" id="btnTrademark">
                    <div class="card-icon">🏷️</div>
                    <div class="card-info">
                        <h3>商標法</h3>
                        <span class="card-meta">Day12 ・ 10問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>

                <button class="category-card" data-category="unfair" id="btnUnfair">
                    <div class="card-icon">🛡️</div>
                    <div class="card-info">
                        <h3>不正競争防止法</h3>
                        <span class="card-meta">Day13 ・ 5問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>

                <button class="category-card" data-category="international" id="btnInternational">
                    <div class="card-icon">🌍</div>
                    <div class="card-info">
                        <h3>国際出願・ライセンス戦略</h3>
                        <span class="card-meta">Day14 ・ 7問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>

                <button class="category-card" data-category="ipbusiness" id="btnIpBusiness">
                    <div class="card-icon">💼</div>
                    <div class="card-info">
                        <h3>IPビジネス・周辺知財</h3>
                        <span class="card-meta">Day15 ・ 7問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>

                <button class="category-card all" data-category="all" id="btnAll">
                    <div class="card-icon">🏆</div>
                    <div class="card-info">
                        <h3>全問チャレンジ</h3>
                        <span class="card-meta">全カテゴリ ・ 59問</span>
                    </div>
                    <div class="card-badge">START</div>
                </button>
            </div>

            <div class="mode-toggle">
                <label class="toggle-label" for="shuffleToggle">
                    <input type="checkbox" id="shuffleToggle" checked>
                    <span class="toggle-slider"></span>
                    <span class="toggle-text">出題順をシャッフル</span>
                </label>
            </div>
        </div>
    </div>

    <!-- ===== QUIZ SCREEN ===== -->
    <div class="screen" id="quizScreen">
        <div class="quiz-container">
            <div class="quiz-header">
                <button class="btn-back" id="btnBackToStart" title="カテゴリ選択に戻る">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="progress-info">
                    <span id="questionCounter">1 / 10</span>
                    <span class="category-label" id="categoryLabel">著作権法</span>
                </div>
                <div class="score-badge" id="scoreBadge">
                    <span class="score-correct" id="scoreCorrect">0</span>
                    <span class="score-sep">/</span>
                    <span class="score-total" id="scoreAnswered">0</span>
                </div>
            </div>

            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="question-card" id="questionCard">
                <div class="question-number" id="questionNumber">Q1</div>
                <p class="question-text" id="questionText"></p>
            </div>

            <div class="choices" id="choicesContainer">
                <!-- Choices injected by JS -->
            </div>

            <div class="explanation-card hidden" id="explanationCard">
                <div class="explanation-header">
                    <span class="explanation-icon" id="explanationIcon">✅</span>
                    <span class="explanation-title" id="explanationTitle">正解！</span>
                </div>
                <p class="explanation-text" id="explanationText"></p>
            </div>

            <button class="btn-next hidden" id="btnNext">
                次の問題へ
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 4L13 9L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>

    <!-- ===== RESULT SCREEN ===== -->
    <div class="screen" id="resultScreen">
        <div class="result-container">
            <div class="result-visual">
                <div class="result-ring">
                    <svg viewBox="0 0 160 160" id="resultRingSvg">
                        <circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.08)" stroke-width="10" fill="none"/>
                        <circle cx="80" cy="80" r="70" stroke="url(#ringGrad)" stroke-width="10" fill="none"
                                stroke-linecap="round" id="resultCircle"
                                stroke-dasharray="439.82" stroke-dashoffset="439.82"
                                transform="rotate(-90 80 80)"/>
                        <defs>
                            <linearGradient id="ringGrad" x1="0" y1="0" x2="160" y2="160">
                                <stop stop-color="#818cf8"/>
                                <stop offset="1" stop-color="#c084fc"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="result-score-display">
                        <span class="result-percent" id="resultPercent">0</span><span class="percent-sign">%</span>
                    </div>
                </div>
            </div>

            <h2 class="result-title" id="resultTitle">お疲れさまでした！</h2>
            <p class="result-summary" id="resultSummary">10問中 8問正解</p>

            <div class="result-message" id="resultMessage"></div>

            <div class="result-stats">
                <div class="stat-item">
                    <span class="stat-value correct" id="statCorrect">8</span>
                    <span class="stat-label">正解</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value wrong" id="statWrong">2</span>
                    <span class="stat-label">不正解</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value time" id="statTime">1:23</span>
                    <span class="stat-label">所要時間</span>
                </div>
            </div>

            <div class="result-actions">
                <button class="btn-primary" id="btnRetry">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9a7 7 0 1 1 1.5 4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M2 14V9.5H6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    もう一度挑戦
                </button>
                <button class="btn-secondary" id="btnReview">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3h12v12H3z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M3 7h12M7 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    解答を確認
                </button>
                <button class="btn-ghost" id="btnHome">カテゴリ選択に戻る</button>
            </div>
        </div>
    </div>

    <!-- ===== REVIEW SCREEN ===== -->
    <div class="screen" id="reviewScreen">
        <div class="review-container">
            <div class="review-header">
                <h2>解答一覧</h2>
                <button class="btn-back" id="btnBackToResult" title="結果に戻る">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>結果に戻る</span>
                </button>
            </div>
            <div class="review-filter">
                <button class="filter-btn active" data-filter="all">すべて</button>
                <button class="filter-btn" data-filter="wrong">不正解のみ</button>
            </div>
            <div class="review-list" id="reviewList">
                <!-- Injected by JS -->
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
